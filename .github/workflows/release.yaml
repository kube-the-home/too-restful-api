name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    uses: kube-the-home/github-actions/.github/workflows/semantic-release.yaml@9a4771645c64b73a0f4c5409e3c3b714932590f2 # v1.4.8
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}

  docker:
    needs: release
    if: needs.release.outputs.new_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.release.outputs.new_version }}
            type=raw,value=latest
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    needs: release
    if: needs.release.outputs.new_version != ''
    uses: kube-the-home/github-actions/.github/workflows/helm-release.yaml@9a4771645c64b73a0f4c5409e3c3b714932590f2 # v1.4.8
    with:
      chart_path: charts/too-restful-api
      version: ${{ needs.release.outputs.new_version }}
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}
